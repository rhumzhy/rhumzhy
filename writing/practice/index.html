<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>practice — rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    padding:clamp(3rem, 10vh, 6rem) clamp(1.5rem, 9vw, 8rem) 20vh;
  }
  main{ max-width:38rem; }
  h1{
    font-size:clamp(1.55rem, 4vw, 2.25rem);
    font-weight:400;
    letter-spacing:-0.015em;
    line-height:1;
    margin:1.1rem 0 0.9rem;
  }
  .line{ color:var(--muted); font-size:1rem; margin-bottom:clamp(2.2rem, 6vh, 3.5rem); }

  #posts{ list-style:none; display:flex; flex-direction:column; gap:0.85rem; }
  #posts a{
    display:flex;
    align-items:baseline;
    gap:1.1rem;
    width:fit-content;
    color:var(--ink);
    text-decoration:none;
    font-size:1.05rem;
    position:relative;
    -webkit-tap-highlight-color:transparent;
  }
  #posts a::before{
    content:"";
    position:absolute;
    left:0; bottom:-0.14em;
    width:100%; height:1px;
    background:currentColor;
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .28s var(--ease);
  }
  #posts a:hover::before,
  #posts a:focus-visible::before,
  #posts a:active::before{ transform:scaleX(1); }
  #posts a:focus-visible{ outline:none; }

  @media (prefers-reduced-motion: reduce){
    #posts a::before{ transition:none; }
  }
</style>
</head>
<body>

  <main class="rise">
    <a class="mark" href="/writing/">← writing</a>
    <h1>practice</h1>
    <p class="line">write, why not</p>

    <ul id="posts"></ul>
    <noscript><p class="line">the index needs javascript.</p></noscript>
  </main>

<script>
  fetch('/writing/practice/posts.json')
    .then(r => r.json())
    .then(posts => {
      const now = new Date().getFullYear();
      document.getElementById('posts').innerHTML = posts.map(p => {
        const [y, m, d] = p.date.split('-');
        const mark = (Number(y) === now) ? `${m}.${d}` : `${y}.${m}.${d}`;
        return `<li><a href="${p.path}"><span class="mark">${mark}</span>${p.title}</a></li>`;
      }).join('');
    });
</script>

</body>
</html>
