<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:10vh clamp(1.5rem, 9vw, 8rem);
  }

  .hub{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:3rem;
    width:100%;
  }

  nav{
    display:flex;
    flex-direction:column;
    gap:clamp(0.9rem, 2.2vw, 1.4rem);
  }

  /* the art — temporary preview: tap it to cycle the candidates */
  .art{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.7rem;
    opacity:0;
    animation:rise .7s var(--ease) .45s forwards;
  }
  .ouro{
    font-family:var(--mono);
    line-height:1;
    color:var(--muted);
    user-select:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  #artmark{ letter-spacing:0.2em; }

  @media (max-width:760px){
    .hub{
      flex-direction:column;
      align-items:flex-start;
      gap:clamp(2rem, 6vh, 3rem);
    }
    .art{ align-items:flex-start; }
  }
  @media (prefers-reduced-motion: reduce){
    .art{ animation:none; opacity:1; }
  }
</style>
</head>
<body>

  <div class="hub">
    <nav>
      <!--
        Each line is one destination.
        · The text between the tags is the label people see.
        · href is where it goes:
            "/work/"                  → a project folder in this same repo
            "https://something.com"   → any external site (add target/rel)
        Swap, add, or remove lines freely. The page never needs restructuring.
      -->
      <a class="link" href="/work/">work</a>
      <a class="link" href="/writing/">writing</a>
      <a class="link" href="/experiments/">experiments</a>
      <a class="link" href="/sound/">sound</a>
      <a class="link" href="/curation/">curation</a>
    </nav>

    <div class="art">
      <pre class="ouro" id="ouro" aria-label="ascii art, press for the next piece" role="button" tabindex="0"></pre>
      <span class="mark" id="artmark"></span>
    </div>
  </div>

<script>
(() => {
  const el = document.getElementById('ouro');
  const mark = document.getElementById('artmark');
  const still = matchMedia('(prefers-reduced-motion: reduce)');
  const NL = String.fromCharCode(10);

  let list = [], idx = 0, art = '', t = 0;

  /* size the piece to its box: desktop shares the row with the nav,
     mobile gets the full column under it */
  const fit = () => {
    if (!art) return;
    const lines = art.split(NL);
    const rows = lines.length;
    const cols = Math.max(...lines.map(l => l.length));
    const mobile = matchMedia('(max-width:760px)').matches;
    const nav = document.querySelector('nav');
    const hub = document.querySelector('.hub');
    const availW = mobile
      ? hub.clientWidth
      : hub.clientWidth - nav.offsetWidth - 60;
    const availH = mobile ? innerHeight * 0.52 : innerHeight * 0.76;
    const fs = Math.min(availW / (cols * 0.605), availH / rows);
    el.style.fontSize = Math.max(2.5, Math.min(fs, 14)) + 'px';
  };

  /* braille pieces get the shimmer — a band of light passing over the
     dots. everything else stays still. plain text passes through. */
  const render = () => {
    let out = '', x = 0, y = 0;
    for (let i = 0; i < art.length; i++) {
      const c = art.charCodeAt(i);
      if (c === 10) { out += art[i]; x = 0; y++; continue; }
      if (c > 0x2800 && c <= 0x28FF && Math.sin(0.16 * (x + 2 * y) - t) > 0.95) {
        const bit = 1 << ((x * 7 + y * 3) % 8);
        out += String.fromCharCode(0x2800 + ((c - 0x2800) ^ bit));
      } else {
        out += art[i];
      }
      x++;
    }
    el.textContent = out;
  };

  const show = i => {
    idx = ((i % list.length) + list.length) % list.length;
    art = list[idx].a;
    localStorage.setItem('rz.art.i', idx);
    mark.textContent = `${list[idx].n} · ${idx + 1}/${list.length}`;
    fit();
    render();
  };

  fetch('/assets/art-preview.json')
    .then(r => r.json())
    .then(data => {
      list = data;
      show(parseInt(localStorage.getItem('rz.art.i') || '0', 10) || 0);
      el.addEventListener('click', () => show(idx + 1));
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); show(idx + 1); }
      });
      addEventListener('resize', fit);
      if (!still.matches) {
        setInterval(() => { t += 0.18; render(); }, 120);
      }
    });
})();
</script>

</body>
</html>
