<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:10vh clamp(1.5rem, 9vw, 8rem);
  }

  .hub{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:3rem;
    width:100%;
  }

  nav{
    display:flex;
    flex-direction:column;
    gap:clamp(0.9rem, 2.2vw, 1.4rem);
  }

  /* the ouroboros — the site's own dragon, drawn in type */
  .ouro{
    font-family:var(--mono);
    font-size:clamp(6px, min(0.72vw, 1.3vh), 11px);
    line-height:1;
    color:var(--muted);
    user-select:none;
    opacity:0;
    animation:rise .7s var(--ease) .45s forwards;
  }

  @media (max-width:760px){
    .hub{
      flex-direction:column;
      align-items:flex-start;
      gap:clamp(2rem, 6vh, 3rem);
    }
    .ouro{ font-size:1.35vw; line-height:1; }   /* scaled down, aligned with the words */
  }
  @media (prefers-reduced-motion: reduce){
    .ouro{ animation:none; opacity:1; }
  }
</style>
</head>
<body>

  <div class="hub">
    <nav>
      <!--
        Each line is one destination.
        · The text between the tags is the label people see.
        · href is where it goes:
            "/work/"                  → a project folder in this same repo
            "https://something.com"   → any external site (add target/rel)
        Swap, add, or remove lines freely. The page never needs restructuring.

      <a class="link" href="/experiments/">experiments</a>

    </nav>

  </div>

      const row = ART[y];
      let line = '';
      for (let x = 0; x < row.length; x++) {
        const c = row.charCodeAt(x);
        if (c > 0x2800 && c <= 0x28FF && Math.sin(0.16 * (x + 2 * y) - t) > 0.95) {

          line += row[x];
        }
      }
      out += line + '\n';
    }
    el.textContent = out;
  };
