<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:10vh clamp(1.5rem, 9vw, 8rem);
  }

  .hub{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:3rem;
    width:100%;
  }

  nav{
    display:flex;
    flex-direction:column;
    gap:clamp(0.9rem, 2.2vw, 1.4rem);
  }

  /* the ouroboros — the site's own dragon, drawn in type */
  .ouro{
    font-family:var(--mono);
    font-size:clamp(9px, 1.05vw, 12px);
    line-height:1.15;
    color:var(--muted);
    user-select:none;
    opacity:0;
    animation:rise .7s var(--ease) .45s forwards;
  }

  @media (max-width:760px){
    .hub{
      flex-direction:column;
      align-items:flex-start;
      gap:clamp(2rem, 6vh, 3rem);
    }
    .ouro{ font-size:2.05vw; }   /* scaled down, aligned with the words */
  }
  @media (prefers-reduced-motion: reduce){
    .ouro{ animation:none; opacity:1; }
  }
</style>
</head>
<body>

  <div class="hub">
    <nav>
      <!--
        Each line is one destination.
        · The text between the tags is the label people see.
        · href is where it goes:
            "/work/"                  → a project folder in this same repo
            "https://something.com"   → any external site (add target/rel)
        Swap, add, or remove lines freely. The page never needs restructuring.
      -->
      <a class="link" href="/work/">work</a>
      <a class="link" href="/writing/">writing</a>
      <a class="link" href="/experiments/">experiments</a>
      <a class="link" href="/sound/">sound</a>
      <a class="link" href="/curation/">curation</a>
    </nav>

    <pre class="ouro" id="ouro" aria-hidden="true"></pre>
  </div>

<script>
(() => {
  const el = document.getElementById('ouro');
  if (!el) return;

  /* a dragon coiled on itself: head fixed at the gap, the body a ring of
     scales flowing forever into its own mouth. spines ripple along the
     back; the wings beat slowly. */
  const ROWS = 22, COLS = 48, SEG = 110;
  const CX = 22.5, CY = 12.5, R = 7.0, AR = 2.1;
  const GAP_A = -0.66, GAP_B = -0.12;                  /* the open mouth */
  const SPAN = (GAP_A + 2 * Math.PI) - GAP_B;
  const SCALES = 'oO0O';
  const mod = (a, n) => ((a % n) + n) % n;

  const frame = (phase, flap) => {
    const g = Array.from({ length: ROWS }, () => Array(COLS).fill(' '));
    const put = (y, x, ch) => {
      if (y >= 0 && y < ROWS && x >= 0 && x < COLS) g[y][x] = ch;
    };
    const puts = (y, x, s) => {
      for (let k = 0; k < s.length; k++) if (s[k] !== ' ') put(y, x + k, s[k]);
    };

    for (let i = 0; i < SEG; i++) {
      const f = i / (SEG - 1);                         /* 0 neck → 1 tail tip */
      const t = GAP_B + f * SPAN;
      const x = Math.round(CX + Math.cos(t) * R * AR);
      const y = Math.round(CY + Math.sin(t) * R);
      let ch;
      if (f > 0.96) ch = '.';                          /* the tail, being eaten */
      else if (f > 0.88) ch = '~';
      else ch = SCALES[mod(i - phase, SCALES.length)]; /* scales flow into the mouth */
      put(y, x, ch);

      /* spines ripple along the outer back */
      if (mod(i - phase, 8) === 0 && f <= 0.75) {
        const xo = Math.round(CX + Math.cos(t) * (R * AR + 2.6));
        const yo = Math.round(CY + Math.sin(t) * (R + 1.2));
        const a = mod(t * 180 / Math.PI, 360);
        let sp;
        if (a < 30 || a >= 330) sp = '>';
        else if (a < 75) sp = '\\';
        else if (a < 105) sp = 'v';
        else if (a < 150) sp = '/';
        else if (a < 210) sp = '<';
        else if (a < 255) sp = '\\';
        else if (a < 285) sp = '^';
        else sp = '/';
        put(yo, xo, sp);
      }
    }

    /* the head — eye, jaw, the mouth where the tail arrives */
    const hx = 33, hy = 6;
    puts(hy - 1, hx, '   __');
    puts(hy, hx, " ,'o \\_");
    puts(hy + 1, hx, "  \\__,-'");

    /* wings on the back, beating */
    const wx = 13;
    if (flap === 0) {
      puts(1, wx, '   ,^,      ,^,');
      puts(2, wx, '  / | \\    / | \\');
      puts(3, wx, " /  '  \\__/  '  \\");
      puts(4, wx, '/                \\');
    } else {
      puts(2, wx, '  _          _');
      puts(3, wx, ' / \\,_    _,/ \\');
      puts(4, wx, '/     \\__/     \\');
    }

    return g.map(r => r.join('')).join('\n');
  };

  let phase = 0;
  const still = matchMedia('(prefers-reduced-motion: reduce)');
  const draw = () => { el.textContent = frame(phase, Math.floor(phase / 4) % 2); };
  draw();
  if (!still.matches) {
    setInterval(() => { phase += 1; draw(); }, 140);
  }
})();
</script>

</body>
</html>
