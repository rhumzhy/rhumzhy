<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sound — rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    padding:clamp(3rem, 10vh, 6rem) clamp(1.5rem, 9vw, 8rem) 20vh;
  }
  main{ max-width:38rem; }
  .back{ margin-bottom:clamp(1.8rem, 5vh, 3rem); }

  #mixes{ list-style:none; display:flex; flex-direction:column; gap:0.85rem; }
  #mixes li{
    display:flex;
    align-items:baseline;
    gap:1.1rem;
    flex-wrap:wrap;
  }
  .title{ font-size:1.05rem; color:var(--ink); }

  .trail{ display:flex; gap:0.7rem; }
  .v{
    position:relative;
    font-family:var(--mono);
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:var(--muted);
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .v.latest{ color:var(--ink); }
  .v.master{ color:var(--accent); }
  .v::before{
    content:"";
    position:absolute;
    left:0; bottom:-0.2em;
    width:100%; height:1px;
    background:currentColor;
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .28s var(--ease);
  }
  .v:hover::before,
  .v:focus-visible::before,
  .v:active::before{ transform:scaleX(1); }
  .v:focus-visible{ outline:none; }

  .empty{ color:var(--muted); font-size:1rem; }

  @media (prefers-reduced-motion: reduce){
    .v::before{ transition:none; }
  }
</style>
</head>
<body>

  <main class="rise">
    <a class="back" href="/" aria-label="back">←</a>
    <ul id="mixes"></ul>
    <noscript><p class="empty">the feed needs javascript.</p></noscript>
  </main>

<script>
  fetch('/data/mixes.json')
    .then(r => r.json())
    .then(mixes => {
      const el = document.getElementById('mixes');
      if (!mixes.length) {
        el.outerHTML = '<p class="empty">nothing here yet. growing.</p>';
        return;
      }
      const latest = m => m.versions[m.versions.length - 1];
      mixes.sort((a, b) => latest(b).date.localeCompare(latest(a).date));
      el.innerHTML = mixes.map(m => {
        const trail = m.versions.map((v, i) => {
          const last = i === m.versions.length - 1;
          const cls = ['v'];
          if (last) cls.push(m.status === 'master' ? 'master' : 'latest');
          return `<a class="${cls.join(' ')}" href="${v.url}" target="_blank" rel="noopener">v${v.v}</a>`;
        }).join('');
        return `<li><span class="title">${m.title}</span><span class="trail">${trail}</span></li>`;
      }).join('');
    });
</script>

</body>
</html>
