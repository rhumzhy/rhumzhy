<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>log — rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    padding:clamp(3rem, 10vh, 6rem) clamp(1.5rem, 9vw, 8rem) 20vh;
  }
  main{ max-width:40rem; }
  .back{ margin-bottom:clamp(1.8rem, 5vh, 3rem); }

  section{ margin-bottom:clamp(1.9rem, 5vh, 2.8rem); }
  section > .mark{ display:block; margin-bottom:0.55rem; }

  /* a year of days: 7 rows, one column per week */
  .grid{
    display:grid;
    grid-template-rows:repeat(7, 1fr);
    grid-auto-flow:column;
    grid-auto-columns:minmax(0, 1fr);
    gap:2px;
  }
  .d{ aspect-ratio:1; border-radius:1px; background:rgba(20,20,20,0.06); }
  .d.on{ background:var(--ink); }
  .d.all{ background:var(--accent); }
  .d.today{ box-shadow:inset 0 0 0 1px var(--muted); }
  .d.future{ visibility:hidden; }

  /* minutes — one line per habit, last 30 days */
  #chart{ width:100%; height:7rem; display:block; }

  /* work hours — last 30 days */
  .bars{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:3.2rem;
    border-bottom:1px solid rgba(20,20,20,0.12);
  }
  .b{ flex:1; background:var(--muted); }
  .b.today{ background:var(--accent); }
  .totals{ margin-top:0.55rem; }

  @media (max-width:480px){
    .grid, .bars{ gap:1px; }
  }
</style>
</head>
<body>

  <main class="rise">
    <a class="back" href="/experiments/" aria-label="back">←</a>
    <div id="habits"></div>
    <section id="minutes" hidden>
      <p class="mark">minutes</p>
      <svg id="chart" viewBox="0 0 600 120" preserveAspectRatio="none" aria-label="minutes per habit, last 30 days"></svg>
    </section>
    <section id="hours" hidden>
      <p class="mark">work hours</p>
      <div class="bars" id="bars"></div>
      <p class="mark totals" id="totals"></p>
    </section>
    <noscript><p class="mark">the log needs javascript.</p></noscript>
  </main>

<script>
(async () => {
  const pad = n => String(n).padStart(2, '0');
  const iso = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const [habits, hours] = await Promise.all([
    fetch('/data/habits.json').then(r => r.json()),
    fetch('/data/hours.json').then(r => r.json())
  ]);

  /* ---- habits: one grid per habit, jan 1 → dec 31 ---- */
  const Y = today.getFullYear();
  const jan1 = new Date(Y, 0, 1);
  const start = new Date(jan1);
  start.setDate(jan1.getDate() - ((jan1.getDay() + 6) % 7));   /* back to monday */
  const end = new Date(Y, 11, 31);

  const mins = (day, h) => (habits.log[day] || {})[h] || 0;
  const done = (day, h) => mins(day, h) > 0;
  const perfect = day => habits.habits.every(h => done(day, h));

  const streak = h => {
    let n = 0;
    const d = new Date(today);
    if (!done(iso(d), h)) d.setDate(d.getDate() - 1);   /* today still open */
    while (done(iso(d), h)) { n++; d.setDate(d.getDate() - 1); }
    return n;
  };

  document.getElementById('habits').innerHTML = habits.habits.map(h => {
    let cells = '';
    for (const d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const day = iso(d);
      const cls = ['d'];
      if (d < jan1 || d > today) cls.push('future');
      else if (perfect(day)) cls.push('all');
      else if (done(day, h)) cls.push('on');
      if (d.getTime() === today.getTime()) cls.push('today');
      cells += `<div class="${cls.join(' ')}"></div>`;
    }
    return `<section>
      <p class="mark">${h} · ${streak(h)}</p>
      <div class="grid">${cells}</div>
    </section>`;
  }).join('');

  /* ---- last 30 days, shared by both charts ---- */
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    days.push(d);
  }

  /* ---- minutes: one line per habit, direct-labeled ---- */
  const shades = ['#141414', '#6B6B66', '#9A9A94'];
  const anyMinutes = days.some(d => habits.habits.some(h => mins(iso(d), h) > 0));
  if (anyMinutes) {
    const W = 530, H = 120, PAD = 6;
    const maxM = Math.max(60, ...days.map(d => Math.max(...habits.habits.map(h => mins(iso(d), h)))));
    const x = i => (i / (days.length - 1)) * W;
    const y = v => H - PAD - (v / maxM) * (H - 2 * PAD);
    document.getElementById('chart').innerHTML = habits.habits.map((h, hi) => {
      const pts = days.map((d, i) => `${x(i).toFixed(1)},${y(mins(iso(d), h)).toFixed(1)}`).join(' ');
      const last = y(mins(iso(days[days.length - 1]), h));
      return `<polyline points="${pts}" fill="none" stroke="${shades[hi % 3]}" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
        <text x="${W + 6}" y="${(last + 3).toFixed(1)}" fill="${shades[hi % 3]}"
          font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="9">${h}</text>`;
    }).join('');
    document.getElementById('minutes').hidden = false;
  }

  /* ---- work hours: last 30 days ---- */
  const val = v => {
    if (typeof v === 'number') return v;
    if (v && typeof v === 'object')
      return Object.values(v).reduce((s, x) => s + (typeof x === 'number' ? x : 0), 0);
    return 0;
  };
  const at = d => val(hours.log[iso(d)]);
  const max = Math.max(...days.map(at), 1);

  document.getElementById('bars').innerHTML = days.map(d => {
    const h = at(d);
    const t = d.getTime() === today.getTime() ? ' today' : '';
    return `<div class="b${t}" style="height:${(h / max) * 100}%"></div>`;
  }).join('');

  const monday = d => { const m = new Date(d); m.setDate(m.getDate() - ((m.getDay() + 6) % 7)); return m; };
  const sum = (a, b) => {
    let s = 0;
    for (const d = new Date(a); d <= b; d.setDate(d.getDate() + 1)) s += at(d);
    return Math.round(s * 10) / 10;
  };
  const mon = monday(today);
  const lastMon = new Date(mon); lastMon.setDate(mon.getDate() - 7);
  const lastSun = new Date(mon); lastSun.setDate(mon.getDate() - 1);
  document.getElementById('totals').textContent =
    `${sum(mon, today)} this week · ${sum(lastMon, lastSun)} last`;
  document.getElementById('hours').hidden = false;
})();
</script>

</body>
</html>
