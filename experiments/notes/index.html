<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notes — rhumzhy</title>
<link rel="stylesheet" href="/assets/base.css">
<style>
  body{
    padding:clamp(1.6rem, 5vh, 3rem) clamp(1.2rem, 5vw, 4rem) 8vh;
    display:flex; flex-direction:column;
  }
  main{ width:100%; max-width:72rem; margin:0 auto; flex:1; display:flex; flex-direction:column; }
  .top{ display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:clamp(1.4rem, 4vh, 2.4rem); }
  button.mark, label.mark{ background:none; border:0; cursor:pointer; padding:0.2em 0;
    -webkit-tap-highlight-color:transparent; }
  button.mark:hover, button.mark:focus-visible, label.mark:hover{ color:var(--ink); outline:none; }

  .mode{ display:none; flex:1; flex-direction:column; }
  main[data-mode="capture"] .capture{ display:flex; }
  main[data-mode="sort"]    .sort   { display:flex; }

  /* ---- capture — the page is the input ---- */
  .capture{ justify-content:center; max-width:38rem; width:100%; margin:0 auto; }
  #in{
    width:100%; min-height:9rem; background:none; border:0; resize:none;
    color:var(--ink); font-family:inherit; font-size:1.25rem; line-height:1.6;
    letter-spacing:-0.01em; caret-color:var(--accent);
  }
  #in:focus{ outline:none; }
  #in::placeholder{ color:var(--muted); }
  .capfoot{ display:flex; justify-content:space-between; align-items:baseline; margin-top:1.2rem; }
  #saved{ transition:opacity .28s var(--ease); opacity:0; }
  #saved.show{ opacity:1; }

  /* ---- sort — the workbench ---- */
  .sort{ flex-direction:row; gap:clamp(1.2rem, 3vw, 2.4rem); align-items:flex-start; min-height:0; }
  .pilecol{ flex:1 1 16rem; min-width:0; }
  .panes{ flex:0 0 0; display:flex; gap:1rem; min-width:0; }
  .panes.open{ flex:1.4 1 0; }
  .rail{ flex:0 0 10.5rem; }

  #pile{ list-style:none; display:flex; flex-direction:column; }
  #pile li{
    display:flex; gap:0.7rem; align-items:baseline; cursor:pointer;
    padding:0.45em 0.5em; margin:0 -0.5em; border-radius:2px;
    -webkit-tap-highlight-color:transparent;
  }
  #pile li .txt{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-size:0.95rem; color:var(--ink); }
  #pile li .when{ font-family:var(--mono); font-size:0.66rem; letter-spacing:0.08em; color:var(--muted); }
  #pile li .sel{ font-family:var(--mono); font-size:0.8rem; width:1em; color:transparent; }
  #pile li.selected .sel{ color:var(--accent); }        /* the one thing that matters mid-triage */
  #pile li.focused{ background:rgba(20,20,20,0.05); }
  #pile li .open{ font-family:var(--mono); color:var(--muted); font-size:0.8rem;
    padding:0 0.3em; }
  #pile li .open:hover{ color:var(--ink); }
  #pilehead{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.8rem; }

  .pane{ flex:1 1 0; min-width:0; display:flex; flex-direction:column;
    border-left:1px solid rgba(20,20,20,0.12); padding-left:1rem; }
  .pane.active{ border-left-color:var(--accent); }
  .panehead{ display:flex; justify-content:space-between; gap:0.8rem; align-items:baseline; margin-bottom:0.5rem; }
  .pane textarea{
    width:100%; flex:1; min-height:14rem; background:none; border:0; resize:none;
    color:var(--ink); font-family:inherit; font-size:0.95rem; line-height:1.6;
  }
  .pane textarea:focus{ outline:none; }
  .paneact{ display:flex; gap:1rem; margin-top:0.5rem; }

  .rail ul{ list-style:none; display:flex; flex-direction:column; gap:0.55rem; }
  .rail li{ display:flex; justify-content:space-between; align-items:baseline; gap:0.6rem; }
  .rail button.rname{
    background:none; border:0; cursor:pointer; padding:0.1em 0; text-align:left;
    font-family:var(--mono); font-size:0.72rem; letter-spacing:0.12em; color:var(--muted);
    -webkit-tap-highlight-color:transparent; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .rail button.rname:hover, .rail button.rname:focus-visible{ color:var(--ink); outline:none; }
  .rail li.on .rname{ color:var(--ink); }
  .rail .key{ font-family:var(--mono); font-size:0.62rem; color:var(--muted); opacity:0.7; }
  .rail .cnt{ font-family:var(--mono); font-size:0.66rem; color:var(--muted); }
  #newclus{ width:100%; background:none; border:0; border-bottom:1px solid var(--muted);
    color:var(--ink); font-family:var(--mono); font-size:0.72rem; letter-spacing:0.12em;
    padding:0.2em 0; margin-top:0.6rem; display:none; }
  #newclus:focus{ outline:none; border-bottom-color:var(--ink); }
  .railio{ margin-top:1.8rem; display:flex; flex-direction:column; gap:0.55rem; align-items:flex-start; }

  #keys{ margin-top:2rem; line-height:1.9; letter-spacing:0.12em; }

  .empty{ color:var(--muted); font-size:0.95rem; }

  /* ---- mobile: single column, chips rail ---- */
  @media (max-width:760px){
    .sort{ flex-direction:column; }
    .rail{ flex:none; width:100%; order:-1; }
    .rail ul{ flex-direction:row; flex-wrap:wrap; gap:0.5rem 1.2rem; }
    .rail .key{ display:none; }
    .railio{ flex-direction:row; gap:1.2rem; margin-top:1rem; }
    .panes.open{ flex:none; width:100%; flex-direction:column; }
    .pane{ border-left:0; padding-left:0; border-top:1px solid rgba(20,20,20,0.12); padding-top:0.8rem; }
    .pane.active{ border-top-color:var(--accent); }
    #keys{ display:none; }
    #pile li .txt{ white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  }
</style>
</head>
<body>

<main class="rise" id="app" data-mode="capture">
  <div class="top">
    <a class="back" href="/experiments/" aria-label="back">←</a>
    <button class="mark" id="flip">sort</button>
  </div>

  <!-- capture — dump now -->
  <section class="mode capture">
    <textarea id="in" placeholder="dump it here" autofocus autocomplete="off" spellcheck="false"></textarea>
    <div class="capfoot">
      <span class="mark" id="pilecount"></span>
      <span class="mark" id="saved">in the pile ·</span>
    </div>
  </section>

  <!-- sort — later -->
  <section class="mode sort">
    <div class="pilecol">
      <div id="pilehead">
        <span class="mark" id="viewname">inbox</span>
        <span class="mark" id="selcount"></span>
      </div>
      <ul id="pile"></ul>
      <p class="empty" id="pileempty" hidden>nothing here.</p>
      <span class="mark" id="keys">j k move · x select · enter open · 1–9 file · n new group · a archive · m merge in · esc close</span>
    </div>

    <div class="panes" id="panes"></div>

    <div class="rail">
      <ul id="rail"></ul>
      <input id="newclus" type="text" placeholder="name it" autocomplete="off" spellcheck="false" aria-label="new group name">
      <div class="railio">
        <button class="mark" id="exjson">export json</button>
        <button class="mark" id="exmd">export md</button>
        <button class="mark" id="imp">import</button>
        <input type="file" id="ifile" accept="application/json" hidden>
      </div>
    </div>
  </section>

  <noscript><p class="empty">notes need javascript.</p></noscript>
</main>

<script>
/* ## data — the agent contract (phase 2 bolts onto this)
   IndexedDB "rhumzhy-notes" v1, two stores:
   notes:    { id:"n_<base36>", created:ISO, modified:ISO, text:string,
               cluster:null|"c_<base36>", state:"inbox"|"clustered"|"archived",
               audio:null,                       // reserved for the voice iteration
               merged_from:[ids] }               // provenance after a merge
   clusters: { id:"c_<base36>", name:string, created:ISO }
   export json = { _schema:"rhumzhy-notes/1", exported:ISO, notes:[...], clusters:[...] }
   import merges by id; newer `modified` wins. markdown export mirrors clusters
   as ## headings — either file is readable by a visitor's own agent as-is. */
(function(){
  "use strict";
  var $ = function(s){ return document.querySelector(s); };
  var app = $('#app');
  var SCHEMA = 'rhumzhy-notes/1';

  var db=null, notes=[], clusters=[];
  var view='inbox';                 // 'inbox' | 'archive' | cluster id
  var fi=0, sel=new Set(), panes=[], active=0;

  function uid(p){ return p + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function iso(){ return new Date().toISOString(); }
  function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // ---- idb ------------------------------------------------------------------
  function open(){
    return new Promise(function(res, rej){
      var rq = indexedDB.open('rhumzhy-notes', 1);
      rq.onupgradeneeded = function(){
        rq.result.createObjectStore('notes', { keyPath:'id' });
        rq.result.createObjectStore('clusters', { keyPath:'id' });
      };
      rq.onsuccess = function(){ res(rq.result); };
      rq.onerror = function(){ rej(rq.error); };
    });
  }
  function put(store, obj){
    return new Promise(function(res, rej){
      var t = db.transaction(store,'readwrite');
      t.objectStore(store).put(obj);
      t.oncomplete = res; t.onerror = function(){ rej(t.error); };
    });
  }
  function del(store, id){
    return new Promise(function(res, rej){
      var t = db.transaction(store,'readwrite');
      t.objectStore(store).delete(id);
      t.oncomplete = res; t.onerror = function(){ rej(t.error); };
    });
  }
  function all(store){
    return new Promise(function(res, rej){
      var rq = db.transaction(store).objectStore(store).getAll();
      rq.onsuccess = function(){ res(rq.result); };
      rq.onerror = function(){ rej(rq.error); };
    });
  }

  // ---- capture ----------------------------------------------------------------
  var savedT = 0;
  function capture(text){
    var n = { id:uid('n_'), created:iso(), modified:iso(), text:text,
              cluster:null, state:'inbox', audio:null, merged_from:[] };
    notes.push(n); put('notes', n);
    count();
    var s = $('#saved');
    s.classList.add('show');
    clearTimeout(savedT);
    savedT = setTimeout(function(){ s.classList.remove('show'); }, 900);
  }
  function count(){
    var c = notes.filter(function(n){ return n.state==='inbox'; }).length;
    $('#pilecount').textContent = c ? c + ' in the pile' : '';
  }

  // ---- sort: pile -------------------------------------------------------------
  function inView(){
    if(view==='inbox')   return notes.filter(function(n){ return n.state==='inbox'; });
    if(view==='archive') return notes.filter(function(n){ return n.state==='archived'; });
    return notes.filter(function(n){ return n.state==='clustered' && n.cluster===view; });
  }
  function sortView(list){
    // inbox is a queue — oldest first, work it down. groups/archive: newest first.
    return list.slice().sort(function(a,b){
      return view==='inbox' ? (a.created<b.created?-1:1) : (a.created>b.created?-1:1);
    });
  }
  function when(t){ return t.slice(5,10) + ' ' + t.slice(11,16); }
  function renderPile(){
    var list = sortView(inView());
    fi = Math.min(fi, Math.max(0, list.length-1));
    $('#pile').innerHTML = list.map(function(n,i){
      var first = (n.text.split('\n')[0] || '—');
      return '<li data-id="'+n.id+'" class="'+(sel.has(n.id)?'selected ':'')+(i===fi?'focused':'')+'">'
        + '<span class="sel">■</span>'
        + '<span class="txt">'+esc(first)+'</span>'
        + '<span class="when">'+when(n.created)+'</span>'
        + '<span class="open" data-open="'+n.id+'" role="button" tabindex="0" aria-label="open">›</span>'
        + '</li>';
    }).join('');
    $('#pileempty').hidden = !!list.length;
    $('#selcount').textContent = sel.size ? sel.size + ' selected' : '';
    var names = { inbox:'inbox', archive:'archive' };
    var cl = clusters.find(function(c){ return c.id===view; });
    $('#viewname').textContent = names[view] || (cl ? cl.name : 'inbox');
    var f = $('#pile li.focused'); if(f) f.scrollIntoView({ block:'nearest' });
  }

  // ---- sort: rail ---------------------------------------------------------------
  function ccount(id){ return notes.filter(function(n){ return n.state==='clustered' && n.cluster===id; }).length; }
  function renderRail(){
    var rows = [
      { id:'inbox', name:'inbox', key:'', cnt:notes.filter(function(n){return n.state==='inbox';}).length }
    ].concat(clusters.map(function(c,i){
      return { id:c.id, name:c.name, key:(i<9 ? String(i+1) : ''), cnt:ccount(c.id) };
    })).concat([
      { id:'archive', name:'archive', key:'', cnt:notes.filter(function(n){return n.state==='archived';}).length }
    ]);
    $('#rail').innerHTML = rows.map(function(r){
      return '<li class="'+(view===r.id?'on':'')+'" data-id="'+r.id+'">'
        + '<button class="rname">'+esc(r.name)+'</button>'
        + '<span>'+(r.key?'<span class="key">'+r.key+'</span> ':'')+'<span class="cnt">'+r.cnt+'</span></span>'
        + '</li>';
    }).join('');
  }

  // ---- actions ------------------------------------------------------------------
  function targets(){
    if(sel.size) return notes.filter(function(n){ return sel.has(n.id); });
    var list = sortView(inView());
    return list[fi] ? [list[fi]] : [];
  }
  function fileTo(cid){
    var ts = targets(); if(!ts.length) return;
    ts.forEach(function(n){
      n.cluster = cid; n.state = 'clustered'; n.modified = iso(); put('notes', n);
    });
    sel.clear(); refresh();
  }
  function archive(){
    var ts = targets(); if(!ts.length) return;
    ts.forEach(function(n){ n.state='archived'; n.modified=iso(); put('notes', n); });
    sel.clear(); refresh();
  }
  function newCluster(name){
    var c = { id:uid('c_'), name:name, created:iso() };
    clusters.push(c); put('clusters', c);
    return c;
  }

  // ---- panes ----------------------------------------------------------------------
  var saveT = {};
  function openPane(id){
    if(panes.indexOf(id) !== -1){ active = panes.indexOf(id); renderPanes(); return; }
    if(panes.length >= 2) panes[active] = id; else { panes.push(id); active = panes.length-1; }
    renderPanes();
  }
  function closePane(i){ panes.splice(i,1); active = Math.max(0, panes.length-1); renderPanes(); }
  function renderPanes(){
    var host = $('#panes');
    host.classList.toggle('open', !!panes.length);
    host.innerHTML = panes.map(function(id,i){
      var n = notes.find(function(x){ return x.id===id; });
      if(!n) return '';
      return '<div class="pane '+(i===active?'active':'')+'" data-i="'+i+'">'
        + '<div class="panehead"><span class="mark">'+when(n.created)+'</span>'
        + '<button class="mark" data-close="'+i+'">close</button></div>'
        + '<textarea data-edit="'+id+'" spellcheck="false">'+esc(n.text)+'</textarea>'
        + '<div class="paneact">'
        + '<button class="mark" data-merge="'+id+'">merge selected in</button>'
        + '<button class="mark" data-split="'+id+'">split on ---</button>'
        + '</div></div>';
    }).join('');
  }
  function mergeInto(id){
    var host = notes.find(function(x){ return x.id===id; }); if(!host) return;
    var ts = notes.filter(function(n){ return sel.has(n.id) && n.id!==id; });
    if(!ts.length) return;
    host.text = host.text.replace(/\s+$/,'') + '\n\n' + ts.map(function(n){ return n.text; }).join('\n\n');
    host.merged_from = host.merged_from.concat(ts.map(function(n){ return n.id; }));
    host.modified = iso(); put('notes', host);
    ts.forEach(function(n){ n.state='archived'; n.modified=iso(); put('notes', n); });
    sel.clear(); refresh(); renderPanes();
  }
  function splitNote(id){
    var n = notes.find(function(x){ return x.id===id; }); if(!n) return;
    var parts = n.text.split(/\n---+\n/).map(function(s){ return s.trim(); }).filter(Boolean);
    if(parts.length < 2) return;
    n.text = parts[0]; n.modified = iso(); put('notes', n);
    parts.slice(1).forEach(function(p){
      var m = { id:uid('n_'), created:iso(), modified:iso(), text:p,
                cluster:null, state:'inbox', audio:null, merged_from:[n.id] };
      notes.push(m); put('notes', m);
    });
    refresh(); renderPanes();
  }

  // ---- export / import ---------------------------------------------------------------
  function download(name, text, type){
    var blob = new Blob([text], { type:type });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
  function exportJSON(){
    download('notes.json', JSON.stringify({ _schema:SCHEMA, exported:iso(), notes:notes, clusters:clusters }, null, 2), 'application/json');
  }
  function exportMD(){
    var out = ['<!-- '+SCHEMA+' · exported '+iso()+' -->',''];
    function block(list){
      return list.map(function(n){ return '### '+n.id+' · '+n.created+'\n\n'+n.text; }).join('\n\n');
    }
    var inbox = notes.filter(function(n){ return n.state==='inbox'; });
    if(inbox.length){ out.push('## inbox',''); out.push(block(inbox),''); }
    clusters.forEach(function(c){
      var l = notes.filter(function(n){ return n.state==='clustered' && n.cluster===c.id; });
      if(l.length){ out.push('## '+c.name,''); out.push(block(l),''); }
    });
    var arch = notes.filter(function(n){ return n.state==='archived'; });
    if(arch.length){ out.push('## archive',''); out.push(block(arch),''); }
    download('notes.md', out.join('\n'), 'text/markdown');
  }
  function importJSON(file){
    var fr = new FileReader();
    fr.onload = function(){
      try{
        var d = JSON.parse(fr.result);
        var inN = Array.isArray(d.notes) ? d.notes : [];
        var inC = Array.isArray(d.clusters) ? d.clusters : [];
        inC.forEach(function(c){
          if(!clusters.some(function(x){ return x.id===c.id; })){ clusters.push(c); put('clusters', c); }
        });
        inN.forEach(function(n){
          var cur = notes.find(function(x){ return x.id===n.id; });
          if(!cur){ notes.push(n); put('notes', n); }
          else if((n.modified||'') > (cur.modified||'')){
            Object.assign(cur, n); put('notes', cur);
          }
        });
        refresh();
      }catch(e){ }
    };
    fr.readAsText(file);
  }

  // ---- refresh / mode -------------------------------------------------------------------
  function refresh(){ renderPile(); renderRail(); count(); }
  function mode(m){
    app.dataset.mode = m;
    $('#flip').textContent = m==='capture' ? 'sort' : 'capture';
    if(m==='capture'){ $('#in').focus(); }
    else { sel.clear(); fi = 0; refresh(); }
  }

  // ---- keyboard --------------------------------------------------------------------------
  function typing(){ var t = document.activeElement; return t && (t.tagName==='TEXTAREA' || t.tagName==='INPUT'); }
  document.addEventListener('keydown', function(e){
    if(app.dataset.mode !== 'sort') return;
    if(e.key === 'Escape'){
      if(typing()){ document.activeElement.blur(); return; }
      if($('#newclus').style.display === 'block'){ $('#newclus').style.display='none'; return; }
      if(panes.length){ closePane(active); return; }
      return;
    }
    if(typing()) return;
    var list = sortView(inView());
    switch(e.key){
      case 'j': fi = Math.min(fi+1, Math.max(0,list.length-1)); renderPile(); break;
      case 'k': fi = Math.max(fi-1, 0); renderPile(); break;
      case 'x': if(list[fi]){ var id=list[fi].id; sel.has(id)?sel.delete(id):sel.add(id); renderPile(); } break;
      case 'Enter': if(list[fi]){ openPane(list[fi].id); } break;
      case 'a': archive(); break;
      case 'm': if(panes[active]) mergeInto(panes[active]); break;
      case 'n':
        e.preventDefault();
        var nc = $('#newclus'); nc.style.display='block'; nc.focus();
        break;
      default:
        var d = parseInt(e.key, 10);
        if(d >= 1 && d <= 9 && clusters[d-1]) fileTo(clusters[d-1].id);
    }
  });

  // ---- wire ------------------------------------------------------------------------------
  open().then(function(d){
    db = d;
    return Promise.all([all('notes'), all('clusters')]);
  }).then(function(r){
    notes = r[0]; clusters = r[1].sort(function(a,b){ return a.created<b.created?-1:1; });
    count(); refresh();
  });

  $('#flip').addEventListener('click', function(){
    mode(app.dataset.mode === 'capture' ? 'sort' : 'capture');
  });

  $('#in').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      var t = this.value.trim();
      if(t){ capture(t); this.value=''; }
    }
  });

  $('#pile').addEventListener('click', function(e){
    var op = e.target.closest('[data-open]');
    if(op){ openPane(op.dataset.open); e.stopPropagation(); return; }
    var li = e.target.closest('li[data-id]'); if(!li) return;
    var list = sortView(inView());
    fi = list.findIndex(function(n){ return n.id===li.dataset.id; });
    var id = li.dataset.id;
    sel.has(id) ? sel.delete(id) : sel.add(id);
    renderPile();
  });
  $('#pile').addEventListener('keydown', function(e){
    var op = e.target.closest('[data-open]');
    if(op && (e.key==='Enter' || e.key===' ')){ e.preventDefault(); openPane(op.dataset.open); }
  });

  $('#rail').addEventListener('click', function(e){
    var li = e.target.closest('li[data-id]'); if(!li) return;
    var id = li.dataset.id;
    // with a selection live, tapping a group files into it (mobile path);
    // bare tap switches the view.
    if(sel.size && id!=='inbox' && id!=='archive'){ fileTo(id); return; }
    if(sel.size && id==='archive'){ archive(); return; }
    view = id; fi = 0; sel.clear(); refresh();
  });

  $('#newclus').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      var name = this.value.trim();
      if(name){
        var c = newCluster(name);
        if(sel.size) fileTo(c.id); else refresh();
      }
      this.value=''; this.style.display='none';
    }
    if(e.key === 'Escape'){ this.value=''; this.style.display='none'; }
  });

  $('#panes').addEventListener('click', function(e){
    var c = e.target.closest('[data-close]');
    if(c){ closePane(parseInt(c.dataset.close,10)); return; }
    var m = e.target.closest('[data-merge]');
    if(m){ mergeInto(m.dataset.merge); return; }
    var s = e.target.closest('[data-split]');
    if(s){ splitNote(s.dataset.split); return; }
    var p = e.target.closest('.pane');
    if(p){ active = parseInt(p.dataset.i,10);
      Array.prototype.forEach.call(document.querySelectorAll('.pane'), function(x,i){
        x.classList.toggle('active', i===active);
      });
    }
  });
  $('#panes').addEventListener('input', function(e){
    var t = e.target.closest('[data-edit]'); if(!t) return;
    var id = t.dataset.edit;
    clearTimeout(saveT[id]);
    saveT[id] = setTimeout(function(){
      var n = notes.find(function(x){ return x.id===id; }); if(!n) return;
      n.text = t.value; n.modified = iso(); put('notes', n);
      renderPile(); renderRail();
    }, 400);
  });

  $('#exjson').addEventListener('click', exportJSON);
  $('#exmd').addEventListener('click', exportMD);
  $('#imp').addEventListener('click', function(){ $('#ifile').click(); });
  $('#ifile').addEventListener('change', function(){ if(this.files[0]) importJSON(this.files[0]); this.value=''; });
})();
</script>

</body>
</html>
